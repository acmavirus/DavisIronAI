name: Build and Release EXE (via Changelog)

on:
  push:
    paths:
      - 'changelogs/v*.md' # Chỉ chạy khi có file changelog mới vX.X.X.md

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Cần để lấy được các file mới nhất

    - name: Get Version from Changelog
      id: get_version
      shell: pwsh
      run: |
        # Tìm file .md mới nhất trong thư mục changelogs
        $files = Get-ChildItem -Path changelogs -Filter "v*.md" | Sort-Object Name -Descending
        if ($files.Count -eq 0) {
          Write-Error "Không tìm thấy file changelog nào!"
          exit 1
        }
        $latestFile = $files[0].Name
        $version = $latestFile -replace "v", "" -replace ".md", ""
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Sử dụng phiên bản: $version (từ $latestFile)"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller -r requirements.txt

    - name: Inject Version into Code
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        # Ghi đè file .env tạm thời cho quá trình build hoặc sửa trực tiếp main.py
        # Ở đây ta sửa trực tiếp main.py để EXE mang thông tin version cứng
        (Get-Content src/main.py) -replace 'VERSION = os.getenv\("APP_VERSION", ".*"\)', "VERSION = '$version'" | Set-Content src/main.py
        echo "Đã tiêm VERSION $version vào src/main.py"

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "DavisIronAI" --add-data "src;src" --hidden-import "telegram.ext" --hidden-import "google.generativeai" src/main.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        files: dist/DavisIronAI.exe
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body_path: changelogs/v${{ steps.get_version.outputs.VERSION }}.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
