name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Chạy khi có tag như v1.0.0, v1.1.0...

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "DavisIronAI" --add-data "src;src" --hidden-import "telegram.ext" --hidden-import "google.generativeai" src/main.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/DavisIronAI.exe
        name: Release ${{ github.ref_name }}
        body: |
          🚀 Bản phát hành tự động cho phiên bản ${{ github.ref_name }}.
          
          ### Hướng dẫn sử dụng:
          1. Tải file `DavisIronAI.exe`.
          2. Đảm bảo file `.env` nằm cùng thư mục với exe.
          3. Chạy ứng dụng.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
